<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Metaphysics OS - 跨端适配版</title>
    <style>
        :root { --bg: #030303; --panel: #0a0a0a; --border: #333; --text: #d1d5db; --primary: #cda434; --zhouyi: #4ade80; --ziwei: #a855f7; --qimen: #ef4444; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace; 
            background: var(--bg); color: var(--text); 
            padding: 10px; margin: 0;
            /* 适配 iPhone 底部安全区 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        .os-container { 
            max-width: 1200px; margin: 0 auto; 
            border: 1px solid var(--border); 
            box-shadow: 0 0 40px rgba(205, 164, 52, 0.1); 
            background: var(--panel); 
            padding: 15px; 
            box-sizing: border-box;
        }

        .header h1 { 
            color: var(--primary); margin: 0; 
            font-size: 1.5em; /* 手机端默认缩小标题 */
            letter-spacing: 2px; text-transform: uppercase; text-align: center;
        }

        /* 响应式控制面板：手机上一列，电脑上两列 */
        .control-panel { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; margin: 20px 0; 
            background: #050505; padding: 15px; border: 1px solid #222; 
        }

        @min-width: 768px {
            .header h1 { font-size: 2.2em; }
            .control-panel { grid-template-columns: 1fr 1fr; }
            .module-grid { grid-template-columns: 1fr 1fr 1fr !important; }
        }

        label { display: block; color: var(--primary); font-size: 0.85em; margin-bottom: 8px; font-weight: bold; }
        input[type="datetime-local"] { 
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); 
            color: #fff; font-size: 1em; box-sizing: border-box; border-radius: 4px;
            /* 解决 iOS 输入框内阴影问题 */
            -webkit-appearance: none;
        }

        /* 响应式模块网格 */
        .module-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* 手机端默认一列 */
            gap: 15px; 
        }

        .module { border: 1px solid var(--border); background: #080808; padding: 12px; }
        .mod-title { font-weight: bold; font-size: 1em; margin-bottom: 12px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }

        /* 按钮点击区域优化 */
        button.main-btn { 
            width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid var(--primary); 
            color: var(--primary); font-weight: bold; font-size: 1em; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; border-radius: 4px;
        }
        button.main-btn:active { background: var(--primary); color: #000; }

        /* 导出面板适配 */
        textarea { 
            width: 100%; height: 300px; background: #000; border: 1px solid #222; 
            color: #e5e7eb; font-size: 0.9em; padding: 12px; box-sizing: border-box; 
        }

        /* 奇门盘在手机上的微调 */
        .qimen-board { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, auto); gap: 4px; 
        }
        .qm-cell { min-height: 80px; padding: 5px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="os-container">
    <div class="header">
        <h1>Metaphysics OS</h1>
        <div style="text-align:center; color:#666; font-size:0.75em; margin-top:5px;">Mobile & Desktop Responsive Hub</div>
    </div>

    <div class="control-panel">
        <div>
            <label>[ P1 ] TARGET_BIRTH (本命)</label>
            <input type="datetime-local" id="birth-time" value="1990-01-01T18:18">
        </div>
        <div>
            <div style="display:flex; justify-content:space-between">
                <label>[ P2 ] ACTION_TIME (起局)</label>
                <button onclick="syncCurrentTime()" style="background:none; border:none; color:#888; font-size:0.8em; text-decoration:underline;">同步当前</button>
            </div>
            <input type="datetime-local" id="action-time">
        </div>
        <div class="full-width" style="grid-column: 1 / -1;">
            <button class="main-btn" onclick="runEngines()">>>> 提取数据 (EXTRACT) <<<</button>
        </div>
    </div>

    <div class="module-grid">
        <div class="module"><div class="mod-title" style="color:var(--zhouyi)">> M1: 周易</div><div id="zhouyi-output">STANDBY...</div></div>
        <div class="module"><div class="mod-title" style="color:var(--ziwei)">> M2: 紫微</div><div id="ziwei-output">STANDBY...</div></div>
        <div class="module"><div class="mod-title" style="color:var(--qimen)">> M3: 奇门</div><div id="qimen-output">STANDBY...</div></div>
    </div>

    <div class="export-panel" id="export-panel" style="display:none; margin-top:20px; border-top:1px solid #4ade80; padding-top:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="color:#4ade80; font-weight:bold;">AI PROMPT READY</span>
            <button onclick="copyPrompt()" style="background:#4ade80; border:none; padding:5px 10px; font-weight:bold;">一键复制</button>
        </div>
        <textarea id="ai-prompt-data" readonly></textarea>
    </div>
</div>

<script>
    // 同步时间逻辑
    function syncCurrentTime() {
        let now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('action-time').value = now.toISOString().slice(0, 16);
    }
    window.onload = syncCurrentTime;

    // 此处省略具体的 runEngines 等逻辑函数（保留你之前代码中的核心 JS 逻辑即可）
    // 为了节省篇幅，请将你之前版本中从 const BA_GUA 开始到 runEngines 结束的 JS 代码粘贴在这里
</script>
</body>
</html>
